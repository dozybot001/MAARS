<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico">
  <title>MAARS</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Top input bar -->
  <div id="input-bar">
    <input
      type="text"
      id="research-input"
      placeholder="Research idea, Kaggle URL, or file path... (Enter to start)"
      autocomplete="off"
    >
  </div>

  <!-- Pipeline progress bar -->
  <div id="pipeline-progress">
    <div id="system-status" class="status-indicator status-unknown" title="Checking..."></div>
    <div class="progress-track">
      <div class="progress-node" data-node="refine"><span>Refine</span></div>
      <div class="progress-line" data-after="refine"></div>
      <div class="progress-node" data-node="calibrate"><span>Calibrate</span></div>
      <div class="progress-line" data-after="calibrate"></div>
      <div class="progress-node" data-node="strategy"><span>Strategy</span></div>
      <div class="progress-line" data-after="strategy"></div>
      <div class="progress-node" data-node="decompose"><span>Decompose</span></div>
      <div class="progress-line" data-after="decompose"></div>
      <div class="progress-node" data-node="execute"><span>Execute</span></div>
      <div class="progress-line" data-after="execute"></div>
      <div class="progress-node" data-node="evaluate"><span>Evaluate</span></div>
      <div class="progress-line" data-after="evaluate"></div>
      <div class="progress-node" data-node="write"><span>Write</span></div>
    </div>
    <div id="pipeline-actions">
      <button id="pause-btn" disabled>Pause</button>
      <button id="resume-btn" disabled>Resume</button>
    </div>
  </div>

  <!-- Main workspace -->
  <main>
    <section id="workspace">
      <div class="panel">
        <div class="panel-header">
          <h3>Reasoning Log</h3>
          <span id="activity-indicator" class="activity-badge hidden"></span>
          <span id="token-estimate" class="token-badge"></span>
          <button id="copy-log" title="Copy log">Copy</button>
        </div>
        <div id="log-output" class="panel-body"></div>
      </div>

      <div class="panel-divider"></div>

      <div class="panel">
        <div class="panel-header">
          <h3>Process & Output</h3>
          <span id="elapsed-timer" class="timer-badge"></span>
          <button id="copy-process" title="Copy process">Copy</button>
        </div>
        <div id="process-body" class="panel-body"></div>
      </div>
    </section>
  </main>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-panel">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

<script type="module" src="js/app.js"></script>
</body>
</html>
